http {
    limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;
    server {
        listen 443 ssl;
        server_name forum-api-production-c2a2.up.railway.app;
        ssl_certificate /etc/letsencrypt/live/forum-api-production-c2a2.up.railway.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/forum-api-production-c2a2.up.railway.app/privkey.pem;
        location /threads {
            limit_req zone=threads_limit burst=10 nodelay;
            proxy_pass http://localhost:3000;
        }
    }
}
