name: CD

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Deploy to VPS via rsync
        run: |
          rsync -avz --delete --exclude='.env' --exclude='node_modules' ./ root@202.10.44.243:/root/forum-api/
      - name: Install dependencies & restart app on VPS
        run: |
          ssh -o StrictHostKeyChecking=no root@202.10.44.243 '
            cd /root/forum-api &&
            npm install &&
            pm2 restart forum-api || pm2 start src/app.js --name forum-api
          '
